[Borderless]
; Mode:
;   Fill     - Engine resolution + black borders on the monitor (letterbox).
;   NoFill   - Same engine resolution and Alignment as Fill; no black backdrop.
;   Windowed - Pass-through only (no proxy window changes).
; EnableConsole does not disable the black backdrop in Fill mode.
Mode=Fill

; Where the game window sits on the monitor (Fill / NoFill; default is centered).
;   Centered, TopLeft, TopRight, BottomLeft, BottomRight, Top, Bottom, Left, Right
Alignment=Centered

; Fill mode no longer uses topmost; taskbar/other apps can appear when unfocused.
HideTaskbar=1
ForceWindowed=1

EnableConsole=0

; SplashScreens:
;   1 - Show BioWare/Obsidian logo splash screens on startup.
;   0 - Skip splash screens (Steam swkotor2.exe build only).
SplashScreens=0


; IMPORTANT: YOU MUST TURN OFF DISCORD OVERLAY, DISCORD OVERLAY LEGACY, AND STEAM IN-GAME OVERLAY FOR THIS TO NOT CRASH!!
; -> Discord (including Legacy Overlay)
; -> Steam (in-game overlay)
; Disable both for swkotor2.exe. See README.txt and dinput8.log if issues persist.